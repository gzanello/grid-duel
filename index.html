<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1020">
<title>Grid Duel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#0b1020;
    --bg1:#151d38;
    --panel:rgba(30,41,59,.72);
    --panel-solid:#1e293b;
    --border:rgba(148,163,184,.18);
    --accent:#38bdf8;
    --accent2:#8b5cf6;
    --player:#3b82f6;
    --player-light:#60a5fa;
    --computer:#f43f5e;
    --computer-light:#fb7185;
    --text:#f1f5f9;
    --muted:#94a3b8;
    --valid:#34d399;
    --gold:#f59e0b;
    --hint:#a855f7;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Outfit','Segoe UI',Tahoma,Geneva,sans-serif;
    background:
      radial-gradient(1100px 600px at 15% -10%, rgba(56,189,248,.14), transparent 60%),
      radial-gradient(900px 600px at 110% 110%, rgba(139,92,246,.16), transparent 60%),
      linear-gradient(160deg,var(--bg0),var(--bg1));
    background-attachment:fixed;
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .screen{display:none;}
  .screen.active{display:flex;animation:screenIn .35s ease;}
  @keyframes screenIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  #menu-screen{flex-direction:column;align-items:center;gap:20px;text-align:center;max-width:520px;}
  h1{
    font-size:2.6em;margin:0;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(90deg,#38bdf8,#8b5cf6,#f472b6);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 18px rgba(56,189,248,.25));
  }
  .subtitle{color:var(--muted);margin:0;}
  .stats-line{
    color:var(--muted);font-size:.85em;
    background:var(--panel);border:1px solid var(--border);
    padding:6px 16px;border-radius:999px;
  }
  .menu-section{
    background:var(--panel);border:1px solid var(--border);border-radius:16px;
    padding:14px 22px 18px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    width:100%;
  }
  .menu-section > p{margin:0 0 10px;color:var(--muted);font-size:.9em;text-transform:uppercase;letter-spacing:1.5px;}
  .difficulty-options{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .diff-btn, .size-btn{
    padding:11px 22px;border-radius:12px;border:2px solid transparent;
    background:rgba(51,65,85,.7);color:var(--text);cursor:pointer;font-size:1em;
    font-family:inherit;font-weight:600;
    transition:all .18s;
  }
  .diff-btn.selected, .size-btn.selected{
    border-color:var(--accent);
    background:linear-gradient(135deg,rgba(56,189,248,.22),rgba(139,92,246,.22));
    box-shadow:0 0 14px rgba(56,189,248,.25);
  }
  .diff-btn:hover, .size-btn:hover{transform:translateY(-2px);}
  .btn-primary{
    padding:15px 46px;border-radius:14px;border:none;
    background:linear-gradient(90deg,#38bdf8,#8b5cf6);
    color:#0b1020;font-weight:800;font-size:1.15em;cursor:pointer;
    font-family:inherit;letter-spacing:.3px;
    box-shadow:0 8px 26px rgba(56,189,248,.35);
    transition:transform .18s, box-shadow .18s;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(56,189,248,.45);}
  .btn-secondary{
    padding:10px 22px;border-radius:12px;border:1px solid var(--border);
    background:var(--panel);color:var(--text);cursor:pointer;font-size:.95em;
    font-family:inherit;font-weight:600;
    display:inline-flex;align-items:center;gap:8px;
    transition:all .18s;
  }
  .btn-secondary:hover{background:rgba(51,65,85,.9);transform:translateY(-1px);}
  .menu-actions{display:flex;justify-content:center;}
  .menu-secondary{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .btn-ico{font-style:normal;}
  .settings-body{margin:16px 0;}
  .settings-row{display:flex;justify-content:space-between;align-items:center;gap:16px;margin:14px 0;color:var(--text);font-size:.95em;}
  #language-select, #starter-select{
    background:var(--panel-solid);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:7px 10px;font-size:.95em;font-family:inherit;
  }
  input[type="checkbox"]{accent-color:var(--accent);width:17px;height:17px;cursor:pointer;}

  #game-screen{flex-direction:column;align-items:center;gap:14px;}
  .scoreboard{display:flex;gap:26px;align-items:center;justify-content:center;}
  .score-card{
    padding:10px 24px;border-radius:14px;
    background:var(--panel);border:2px solid var(--border);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    text-align:center;min-width:124px;
    transition:border-color .25s, box-shadow .25s;
  }
  .score-card.active-turn{border-color:var(--accent);box-shadow:0 0 18px rgba(56,189,248,.35);animation:cardPulse 1.8s ease-in-out infinite;}
  @keyframes cardPulse{
    0%,100%{box-shadow:0 0 12px rgba(56,189,248,.25);}
    50%{box-shadow:0 0 22px rgba(56,189,248,.5);}
  }
  .score-card .label{font-size:.76em;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .score-card .value{font-size:1.9em;font-weight:800;}
  .score-card.player .value{color:var(--player-light);}
  .score-card.computer .value{color:var(--computer-light);}

  #status-msg{
    min-height:34px;color:var(--text);font-size:.95em;text-align:center;
    background:var(--panel);border:1px solid var(--border);
    padding:6px 18px;border-radius:999px;
  }
  #status-msg.thinking::after{content:'';display:inline-block;width:1.1em;text-align:left;animation:dots 1.2s steps(4,end) infinite;}
  @keyframes dots{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}}

  #size-badge{color:var(--muted);font-size:.85em;}

  #board{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    grid-template-rows:repeat(8,1fr);
    gap:5px;
    width:min(92vw,540px);
    height:min(92vw,540px);
    background:var(--panel);
    border:1px solid var(--border);
    padding:9px;
    border-radius:16px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 20px 50px rgba(0,0,0,.35);
  }
  .cell{
    position:relative;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(145deg,#36435f,#2b3852);
    color:#cbd5e1;
    border-radius:8px;font-weight:700;font-size:clamp(12px,2.2vw,18px);
    cursor:default;user-select:none;
    transition:transform .12s, background .2s, box-shadow .2s, color .2s;
  }
  .cell.lane{background-image:linear-gradient(rgba(56,189,248,.10),rgba(56,189,248,.10));}
  .cell.valid{
    background:linear-gradient(145deg,#14532d,#166534);
    color:#dcfce7;
    box-shadow:0 0 0 2px var(--valid);
    cursor:pointer;
    animation:validPulse 1.8s ease-in-out infinite;
  }
  @keyframes validPulse{
    0%,100%{box-shadow:0 0 0 2px rgba(52,211,153,.9);}
    50%{box-shadow:0 0 0 2px rgba(52,211,153,.45), 0 0 10px 2px rgba(52,211,153,.25);}
  }
  .cell.valid:hover{transform:scale(1.09);background:linear-gradient(145deg,#166534,#15803d);z-index:2;}
  .cell.claimed-player{background:linear-gradient(145deg,#3b82f6,#2563eb);color:#fff;}
  .cell.claimed-computer{background:linear-gradient(145deg,#f43f5e,#e11d48);color:#fff;}
  .cell.last-move{box-shadow:0 0 0 3px var(--gold), 0 0 12px 2px rgba(245,158,11,.65);z-index:1;}
  .cell.hint{
    box-shadow:0 0 0 3px var(--hint), 0 0 14px 4px rgba(168,85,247,.6);
    animation:hintPulse .9s ease-in-out infinite;z-index:2;
  }
  @keyframes hintPulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.1);}
  }
  .cell.kb-focus{outline:2px dashed #e2e8f0;outline-offset:-3px;}
  #board.size-6 .cell{font-size:clamp(15px,3.4vw,24px);}
  #board.size-8 .cell{font-size:clamp(12px,2.2vw,18px);}
  #board.size-10 .cell{font-size:clamp(10px,1.7vw,15px);}
  .cell.pop{animation:pop .3s ease;}
  @keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.25);}
    100%{transform:scale(1);}
  }
  .cell.shake{animation:shake .3s ease;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    75%{transform:translateX(4px);}
  }
  .score-float{
    position:absolute;top:-4px;left:50%;
    font-weight:800;font-size:1em;pointer-events:none;z-index:6;
    animation:floatUp .85s ease-out forwards;
    text-shadow:0 1px 4px rgba(0,0,0,.6);
  }
  .score-float.player{color:var(--player-light);}
  .score-float.computer{color:var(--computer-light);}
  @keyframes floatUp{
    from{opacity:1;transform:translate(-50%,0);}
    to{opacity:0;transform:translate(-50%,-36px);}
  }

  .game-controls-primary{display:flex;justify-content:center;}
  .btn-hint{
    padding:11px 34px;border-radius:12px;border:2px solid var(--hint);
    background:rgba(168,85,247,.14);color:#e9d5ff;cursor:pointer;font-size:1em;
    font-family:inherit;font-weight:700;
    display:inline-flex;align-items:center;gap:8px;
    transition:all .18s;
  }
  .btn-hint:hover{background:rgba(168,85,247,.28);transform:translateY(-1px);box-shadow:0 0 16px rgba(168,85,247,.35);}
  .game-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .icon-btn{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:8px 14px;cursor:pointer;font-size:.9em;
    font-family:inherit;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;
    transition:all .18s;
  }
  .icon-btn:hover{background:rgba(51,65,85,.9);transform:translateY(-1px);}

  .game-area{display:flex;gap:16px;align-items:flex-start;justify-content:center;flex-wrap:wrap;}
  #move-log-panel{
    background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:12px 16px;
    width:200px;max-height:min(92vw,540px);overflow-y:auto;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  #move-log-panel h3{margin:0 0 8px;font-size:.82em;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  #move-log{list-style:none;margin:0;padding:0;font-size:.82em;}
  #move-log li{padding:4px 8px;border-radius:6px;margin-bottom:3px;display:flex;justify-content:space-between;gap:8px;}
  #move-log li.player{background:rgba(59,130,246,.15);color:var(--player-light);}
  #move-log li.computer{background:rgba(244,63,94,.15);color:var(--computer-light);}

  #overlay{
    position:fixed;inset:0;background:rgba(2,6,23,.72);
    display:none;align-items:center;justify-content:center;z-index:50;
    padding:20px;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  #overlay.active{display:flex;}
  .modal{
    background:linear-gradient(160deg,#243147,#1b2539);
    border:1px solid var(--border);
    border-radius:18px;padding:30px;max-width:440px;width:100%;
    text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.55);
    animation:screenIn .3s ease;
  }
  .modal h2{margin-top:0;font-size:1.6em;}
  .final-scores{display:flex;justify-content:center;gap:34px;margin:16px 0;}
  .final-scores .fscore{font-weight:800;font-size:1.8em;}
  .final-scores .flabel{color:var(--muted);font-size:.85em;}
  .modal-actions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}

  #rules-modal .rules-body{text-align:left;color:#cbd5e1;font-size:.95em;line-height:1.6;max-height:52vh;overflow-y:auto;}
  #rules-modal .rules-body p{margin:9px 0;}
  #rules-modal .rules-body strong{color:var(--accent);}

  #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:99;}

  @media (max-width:620px){
    body{padding:12px;}
    h1{font-size:2em;}
    .scoreboard{gap:12px;}
    .score-card{min-width:96px;padding:8px 14px;}
    .score-card .value{font-size:1.5em;}
    #move-log-panel{width:min(92vw,540px);max-height:150px;}
    .game-controls .icon-btn{padding:8px 10px;font-size:.85em;}
    .menu-section{padding:12px 14px 15px;}
  }
</style>
</head>
<body>

  <div id="menu-screen" class="screen active">
    <h1>Grid Duel</h1>
    <p class="subtitle" data-i18n="subtitle">A number-grid strategy game vs. the computer</p>
    <div class="stats-line" id="stats-line" style="display:none;"></div>
    <div class="menu-section">
      <p data-i18n="boardSizeLabel">Board size</p>
      <div class="difficulty-options">
        <button class="size-btn" data-size="6">6&times;6</button>
        <button class="size-btn selected" data-size="8">8&times;8</button>
        <button class="size-btn" data-size="10">10&times;10</button>
      </div>
    </div>
    <div class="menu-section">
      <p data-i18n="chooseDifficulty">Choose difficulty</p>
      <div class="difficulty-options">
        <button class="diff-btn" data-diff="easy" data-i18n="easy">Easy</button>
        <button class="diff-btn selected" data-diff="medium" data-i18n="medium">Medium</button>
        <button class="diff-btn" data-diff="hard" data-i18n="hard">Hard</button>
      </div>
    </div>
    <div class="menu-actions">
      <button class="btn-primary" id="start-btn" data-i18n="startBtn">Start Game</button>
    </div>
    <div class="menu-secondary">
      <button class="btn-secondary" id="rules-btn-menu"><span class="btn-ico">&#128214;</span><span data-i18n="rulesBtn">How to Play</span></button>
      <button class="btn-secondary" id="settings-btn-menu"><span class="btn-ico">&#9881;&#65039;</span><span data-i18n="settingsBtn">Settings</span></button>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="scoreboard">
      <div class="score-card player" id="player-card">
        <div class="label" data-i18n="you">You</div>
        <div class="value" id="player-score">0</div>
      </div>
      <div style="color:var(--muted);font-size:1.3em;" data-i18n="vs">vs</div>
      <div class="score-card computer" id="computer-card">
        <div class="label"><span data-i18n="computer">Computer</span> (<span id="diff-label">Medium</span>)</div>
        <div class="value" id="computer-score">0</div>
      </div>
    </div>
    <div id="status-msg" data-i18n="statusPickBegin">Pick any square to begin.</div>
    <div id="size-badge">Board: 8x8</div>
    <div class="game-area">
      <div id="board"></div>
      <div id="move-log-panel">
        <h3 data-i18n="moveLogTitle">Move Log</h3>
        <ol id="move-log"></ol>
      </div>
    </div>
    <div class="game-controls-primary">
      <button class="btn-hint" id="hint-btn"><span class="btn-ico">&#128161;</span><span data-i18n="hintBtn">Hint</span></button>
    </div>
    <div class="game-controls">
      <button class="icon-btn" id="rules-btn-game"><span class="btn-ico">&#128214;</span><span data-i18n="rulesBtnLabel">Rules</span></button>
      <button class="icon-btn" id="settings-btn-game"><span class="btn-ico">&#9881;&#65039;</span><span data-i18n="settingsBtn">Settings</span></button>
      <button class="icon-btn" id="restart-btn"><span class="btn-ico">&#128260;</span><span data-i18n="restartBtn">Restart</span></button>
      <button class="icon-btn" id="menu-btn"><span class="btn-ico">&#127968;</span><span data-i18n="menuBtn">Main Menu</span></button>
    </div>
  </div>

  <div id="overlay">
    <div class="modal" id="end-modal">
      <h2 id="end-title">Game Over</h2>
      <p id="end-reason" style="color:var(--muted);"></p>
      <div class="final-scores">
        <div><div class="fscore" style="color:var(--player-light);" id="final-player">0</div><div class="flabel" data-i18n="you">You</div></div>
        <div><div class="fscore" style="color:var(--computer-light);" id="final-computer">0</div><div class="flabel" data-i18n="computer">Computer</div></div>
      </div>
      <div class="modal-actions">
        <button class="btn-primary" id="rematch-btn" data-i18n="playAgainBtn">Play Again</button>
        <button class="btn-secondary" id="end-menu-btn" data-i18n="menuBtn">Main Menu</button>
      </div>
    </div>
    <div class="modal" id="rules-modal" style="display:none;">
      <h2 data-i18n="rulesModalTitle">How to Play</h2>
      <div class="rules-body"></div>
      <div class="modal-actions">
        <button class="btn-primary" id="close-rules-btn" data-i18n="closeRulesBtn">Got it</button>
      </div>
    </div>
    <div class="modal" id="settings-modal" style="display:none;">
      <h2 data-i18n="settingsTitle">Settings</h2>
      <div class="settings-body">
        <div class="settings-row">
          <span data-i18n="languageLabel">Language</span>
          <select id="language-select">
            <option value="en">English</option>
            <option value="it">Italiano</option>
            <option value="fr">Fran&ccedil;ais</option>
            <option value="es">Espa&ntilde;ol</option>
          </select>
        </div>
        <div class="settings-row">
          <span data-i18n="whoStartsLabel">Who starts?</span>
          <select id="starter-select">
            <option value="player" data-i18n="you">You</option>
            <option value="computer" data-i18n="computer">Computer</option>
            <option value="random" data-i18n="random">Random</option>
          </select>
        </div>
        <label class="settings-row">
          <span data-i18n="soundLabel">Sound effects</span>
          <input type="checkbox" id="sound-toggle" checked>
        </label>
        <label class="settings-row">
          <span data-i18n="showMoveLogLabel">Show move log</span>
          <input type="checkbox" id="movelog-toggle">
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn-primary" id="close-settings-btn" data-i18n="closeSettingsBtn">Done</button>
      </div>
    </div>
  </div>

<script>
(function(){
  'use strict';

  let boardSize = 8; // 6, 8, or 10

  let board = [];       // N x N numbers 1-N*N
  let claimed = [];      // N x N of null | 'player' | 'computer'
  let cellEls = [];       // N x N DOM refs
  let currentTurn = 'player';
  let lastMove = null;    // {row,col}
  let lastMoveEl = null;   // DOM ref for last-move highlight
  let nextConstraint = null; // null | 'row' | 'column'
  let difficulty = 'medium';
  let playerScore = 0, computerScore = 0;
  let soundOn = true;
  let showMoveLog = false;
  let starterMode = 'player'; // 'player' | 'computer' | 'random'
  let gameActive = false;
  let gameId = 0;         // guards stale computer-move timeouts
  let audioCtx = null;
  let currentLang = 'en';
  let kbFocus = null;     // {row,col} keyboard cursor
  let stats = {wins:0, losses:0, ties:0};

  const TRANSLATIONS = {
    en: {
      subtitle: "A number-grid strategy game vs. the computer",
      boardSizeLabel: "Board size",
      chooseDifficulty: "Choose difficulty",
      easy: "Easy", medium: "Medium", hard: "Hard",
      startBtn: "Start Game",
      rulesBtn: "How to Play",
      settingsBtn: "Settings",
      settingsTitle: "Settings",
      languageLabel: "Language",
      whoStartsLabel: "Who starts?",
      random: "Random",
      soundLabel: "Sound effects",
      closeSettingsBtn: "Done",
      showMoveLogLabel: "Show move log",
      you: "You",
      computer: "Computer",
      vs: "vs",
      statusPickBegin: "Pick any square to begin.",
      statusYourTurn: "Your turn — pick a number from the highlighted {constraint}.",
      statusComputerThinking: "Computer is thinking",
      row: "row",
      column: "column",
      boardBadge: "Board: {size}x{size}",
      hintBtn: "Hint",
      rulesBtnLabel: "Rules",
      restartBtn: "Restart",
      menuBtn: "Main Menu",
      youWin: "You Win!",
      computerWins: "Computer Wins!",
      tie: "It's a Tie!",
      reasonFull: "The board is completely filled.",
      reasonDeadEnd: "No legal moves remain in the required row/column.",
      playAgainBtn: "Play Again",
      rulesModalTitle: "How to Play",
      ruleBoardLabel: "The board:",
      ruleBoardText: "Every square holds a number, from 1 up to the total number of squares. Bigger numbers are worth more points.",
      ruleFirstLabel: "First move:",
      ruleFirstText: "Whoever starts can pick any square they like.",
      ruleAltLabel: "After that:",
      ruleAltText: "Each new pick must line up with the previous one — first in the same column, then in the same row, then the same column again, alternating every turn.",
      ruleClaimLabel: "Scoring:",
      ruleClaimText: "When you pick a square, its number is added to your score and the square is out of the game.",
      ruleEndLabel: "How it ends:",
      ruleEndText: "If the player to move has no free square left in the required row or column, the game stops right there. Highest score wins.",
      ruleDiffLabel: "Difficulty:",
      ruleDiffText: "Easy picks at random. Medium always takes the biggest number it can. Hard plans several moves ahead.",
      ruleHintLabel: "Hint:",
      ruleHintText: "Stuck? Press Hint and the game will suggest your strongest move — the same brain Hard mode uses.",
      ruleKeysLabel: "Keyboard:",
      ruleKeysText: "You can also play with the arrow keys — move around the board and press Enter to pick.",
      closeRulesBtn: "Got it",
      moveLogTitle: "Move Log",
      statsWins: "Wins",
      statsLosses: "Losses",
      statsTies: "Ties"

  function t(key, vars){
    let str = (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) || TRANSLATIONS.en[key] || key;
    if(vars){
      Object.keys(vars).forEach(k=>{ str = str.split('{'+k+'}').join(vars[k]); });
    }
    return str;
  }

  function detectLanguage(){
    const supported=['en','it','fr','es'];
    const navLangs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || 'en'];
    for(const l of navLangs){
      const code = l.slice(0,2).toLowerCase();
      if(supported.includes(code)) return code;
    }
    return 'en';
  }

  function loadSettings(){
    let stored=null;
    try{ stored = JSON.parse(localStorage.getItem('gridDuelSettings')||'null'); }catch(e){}
    if(stored && stored.lang && TRANSLATIONS[stored.lang]) currentLang = stored.lang;
    else currentLang = detectLanguage();
    if(stored && typeof stored.sound === 'boolean') soundOn = stored.sound;
    if(stored && typeof stored.showMoveLog === 'boolean') showMoveLog = stored.showMoveLog;
    if(stored && ['player','computer','random'].includes(stored.starter)) starterMode = stored.starter;
  }

  function saveSettings(){
    try{ localStorage.setItem('gridDuelSettings', JSON.stringify({lang:currentLang, sound:soundOn, showMoveLog:showMoveLog, starter:starterMode})); }catch(e){}
  }

  function loadStats(){
    try{
      const s = JSON.parse(localStorage.getItem('gridDuelStats')||'null');
      if(s && typeof s.wins==='number' && typeof s.losses==='number' && typeof s.ties==='number') stats = s;
    }catch(e){}
  }

  function saveStats(){
    try{ localStorage.setItem('gridDuelStats', JSON.stringify(stats)); }catch(e){}
  }

  function renderStats(){
    const el = document.getElementById('stats-line');
    if(!el) return;
    const total = stats.wins + stats.losses + stats.ties;
    if(total === 0){ el.style.display='none'; return; }
    el.style.display='';
    el.textContent = '🏆 ' + t('statsWins') + ': ' + stats.wins +
      ' · ' + t('statsLosses') + ': ' + stats.losses +
      ' · ' + t('statsTies') + ': ' + stats.ties;
  }

  function applyMoveLogVisibility(){
    const panel = document.getElementById('move-log-panel');
    if(panel) panel.style.display = showMoveLog ? '' : 'none';
  }

  function renderRulesBody(){
    const body = document.querySelector('#rules-modal .rules-body');
    if(!body) return;
    const rows = [
      ['ruleBoardLabel','ruleBoardText'],
      ['ruleFirstLabel','ruleFirstText'],
      ['ruleAltLabel','ruleAltText'],
      ['ruleClaimLabel','ruleClaimText'],
      ['ruleEndLabel','ruleEndText'],
      ['ruleDiffLabel','ruleDiffText'],
      ['ruleHintLabel','ruleHintText'],
      ['ruleKeysLabel','ruleKeysText']
    ];
    body.innerHTML = rows.map(([l,tx])=>`<p><strong>${t(l)}</strong> ${t(tx)}</p>`).join('');
  }

  function constraintLabel(){
    return t(nextConstraint) + (nextConstraint==='column' ? ' ↓' : ' →');
  }

  function refreshStatusText(){
    if(!gameActive) return;
    if(currentTurn==='computer'){
      setStatus(t('statusComputerThinking'), true);
    } else {
      setStatus(lastMove ? t('statusYourTurn',{constraint:constraintLabel()}) : t('statusPickBegin'));
    }
  }

  function applyTranslations(){
    document.documentElement.lang = currentLang;
    document.querySelectorAll('[data-i18n]').forEach(el=>{
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    renderRulesBody();
    renderStats();
    const diffLabelEl = document.getElementById('diff-label');
    if(diffLabelEl) diffLabelEl.textContent = t(difficulty);
    const sizeBadgeEl = document.getElementById('size-badge');
    if(sizeBadgeEl) sizeBadgeEl.textContent = t('boardBadge',{size:boardSize});
    refreshStatusText();
  }

  function getDepthLimit(){
    if(boardSize<=6) return 8;
    if(boardSize===8) return 6;
    return 5;
  }

  // ---------- helpers ----------
  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
  }

  function initBoardData(){
    const total = boardSize*boardSize;
    const nums=[...Array(total).keys()].map(n=>n+1);
    shuffle(nums);
    board=[]; claimed=[];
    for(let r=0;r<boardSize;r++){
      board.push(nums.slice(r*boardSize,r*boardSize+boardSize));
      claimed.push(new Array(boardSize).fill(null));
    }
  }

  function renderBoard(){
    const boardEl=document.getElementById('board');
    boardEl.innerHTML='';
    boardEl.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
    boardEl.style.gridTemplateRows = `repeat(${boardSize}, 1fr)`;
    boardEl.className = 'size-'+boardSize;
    cellEls=[];
    for(let r=0;r<boardSize;r++){
      const rowEls=[];
      for(let c=0;c<boardSize;c++){
        const cell=document.createElement('div');
        cell.className='cell';
        cell.textContent=board[r][c];
        cell.addEventListener('click',(function(rr,cc){return function(){handleCellClick(rr,cc);};})(r,c));
        boardEl.appendChild(cell);
        rowEls.push(cell);
      }
      cellEls.push(rowEls);
    }
  }

  function getValidMoves(){
    if(!lastMove){
      const moves=[];
      for(let r=0;r<boardSize;r++) for(let c=0;c<boardSize;c++) if(!claimed[r][c]) moves.push({row:r,col:c});
      return moves;
    }
    const moves=[];
    if(nextConstraint==='column'){
      for(let r=0;r<boardSize;r++) if(!claimed[r][lastMove.col]) moves.push({row:r,col:lastMove.col});
    } else {
      for(let c=0;c<boardSize;c++) if(!claimed[lastMove.row][c]) moves.push({row:lastMove.row,col:c});
    }
    return moves;
  }

  function refreshBoardClasses(){
    for(let r=0;r<boardSize;r++){
      for(let c=0;c<boardSize;c++){
        const el=cellEls[r][c];
        el.classList.remove('valid');
        el.classList.remove('hint');
        el.classList.remove('lane');
        el.classList.toggle('claimed-player', claimed[r][c]==='player');
        el.classList.toggle('claimed-computer', claimed[r][c]==='computer');
      }
    }
  }

  function highlightValidMoves(){
    getValidMoves().forEach(m=>cellEls[m.row][m.col].classList.add('valid'));
  }

  function highlightLane(){
    if(!lastMove) return;
    if(nextConstraint==='column'){
      for(let r=0;r<boardSize;r++) cellEls[r][lastMove.col].classList.add('lane');
    } else {
      for(let c=0;c<boardSize;c++) cellEls[lastMove.row][c].classList.add('lane');
    }
  }

  function animateClaim(row,col){
    const el=cellEls[row][col];
    el.classList.add('pop');
    setTimeout(()=>el.classList.remove('pop'),300);
  }

  function shakeCell(row,col){
    const el=cellEls[row][col];
    el.classList.add('shake');
    setTimeout(()=>el.classList.remove('shake'),300);
  }

  function floatScore(row,col,value,player){
    const cell=cellEls[row][col];
    if(!cell) return;
    const s=document.createElement('span');
    s.className='score-float '+player;
    s.textContent='+'+value;
    cell.appendChild(s);
    setTimeout(()=>{ if(s.parentNode) s.parentNode.removeChild(s); },900);
  }

  function setStatus(msg, thinking){
    const el=document.getElementById('status-msg');
    el.textContent=msg;
    el.classList.toggle('thinking', !!thinking);
  }

  function animateNumber(el, to){
    const from = parseInt(el.textContent,10) || 0;
    if(from===to){ el.textContent=to; return; }
    if(typeof requestAnimationFrame!=='function' || typeof performance==='undefined'){
      el.textContent=to; return;
    }
    const dur=450, start=performance.now();
    function step(now){
      const p=Math.min(1,(now-start)/dur);
      const eased=1-Math.pow(1-p,3);
      el.textContent=Math.round(from+(to-from)*eased);
      if(p<1) requestAnimationFrame(step);
      else el.textContent=to;
    }
    requestAnimationFrame(step);
  }

  function updateScores(){
    animateNumber(document.getElementById('player-score'), playerScore);
    animateNumber(document.getElementById('computer-score'), computerScore);
    document.getElementById('player-card').classList.toggle('active-turn', currentTurn==='player' && gameActive);
    document.getElementById('computer-card').classList.toggle('active-turn', currentTurn==='computer' && gameActive);
  }

  // ---------- keyboard ----------
  function clearKbFocus(){
    if(kbFocus && cellEls[kbFocus.row] && cellEls[kbFocus.row][kbFocus.col]){
      cellEls[kbFocus.row][kbFocus.col].classList.remove('kb-focus');
    }
    kbFocus=null;
  }

  function setKbFocus(r,c){
    if(kbFocus && cellEls[kbFocus.row] && cellEls[kbFocus.row][kbFocus.col]){
      cellEls[kbFocus.row][kbFocus.col].classList.remove('kb-focus');
    }
    kbFocus={row:r,col:c};
    cellEls[r][c].classList.add('kb-focus');
  }

  document.addEventListener('keydown',(e)=>{
    if(!gameActive || currentTurn!=='player') return;
    const gs=document.getElementById('game-screen');
    if(!gs.classList.contains('active')) return;
    if(document.getElementById('overlay').classList.contains('active')) return;
    const k=e.key;
    if(k==='ArrowUp'||k==='ArrowDown'||k==='ArrowLeft'||k==='ArrowRight'){
      e.preventDefault();
      let r,c;
      if(kbFocus){
        r=kbFocus.row; c=kbFocus.col;
        if(k==='ArrowUp') r=Math.max(0,r-1);
        if(k==='ArrowDown') r=Math.min(boardSize-1,r+1);
        if(k==='ArrowLeft') c=Math.max(0,c-1);
        if(k==='ArrowRight') c=Math.min(boardSize-1,c+1);
      } else {
        r=lastMove?lastMove.row:Math.floor(boardSize/2);
        c=lastMove?lastMove.col:Math.floor(boardSize/2);
      }
      setKbFocus(r,c);
    } else if(k==='Enter'||k===' '){
      if(kbFocus){ e.preventDefault(); handleCellClick(kbFocus.row,kbFocus.col); }
    } else if(k==='h'||k==='H'){
      triggerHint();
    }
  });

  // ---------- game flow ----------
  function handleCellClick(row,col){
    if(!gameActive || currentTurn!=='player') return;
    const valid=getValidMoves();
    const isValid=valid.some(m=>m.row===row&&m.col===col);
    if(!isValid){
      if(!claimed[row][col]){ shakeCell(row,col); playSound('invalid'); }
      return;
    }
    makeMove(row,col,'player');
  }

  function makeMove(row,col,player){
    const value = board[row][col];
    claimed[row][col]=player;
    if(player==='player') playerScore+=value; else computerScore+=value;
    lastMove={row,col};
    nextConstraint=(nextConstraint==='column')?'row':'column';
    currentTurn = player==='player' ? 'computer' : 'player';
    clearKbFocus();
    refreshBoardClasses();
    markLastMove(row,col);
    animateClaim(row,col);
    floatScore(row,col,value,player);
    logMove(player,value);
    updateScores();
    playSound(player==='player'?'claimPlayer':'claimComputer');
    checkGameState();
  }

  function markLastMove(row,col){
    if(lastMoveEl) lastMoveEl.classList.remove('last-move');
    const el=cellEls[row][col];
    el.classList.add('last-move');
    lastMoveEl=el;
  }

  function logMove(player,value){
    const list=document.getElementById('move-log');
    const li=document.createElement('li');
    li.className=player;
    const moveNum=list.children.length+1;
    li.innerHTML = `<span>#${moveNum} ${player==='player'?t('you'):t('computer')}</span><span>${value}</span>`;
    list.appendChild(li);
    list.scrollTop = list.scrollHeight;
  }

  function checkGameState(){
    if(!gameActive) return;
    const allClaimed = claimed.every(row=>row.every(c=>c!==null));
    if(allClaimed){ endGame(t('reasonFull')); return; }
    const moves=getValidMoves();
    if(moves.length===0){
      endGame(t('reasonDeadEnd'));
      return;
    }
    refreshBoardClasses();
    if(lastMoveEl) lastMoveEl.classList.add('last-move');
    updateScores();
    if(currentTurn==='computer'){
      setStatus(t('statusComputerThinking'), true);
      const myId=gameId;
      setTimeout(()=>{ if(myId===gameId) computerMove(); },550);
    } else {
      setStatus(lastMove ? t('statusYourTurn',{constraint:constraintLabel()}) : t('statusPickBegin'));
      highlightLane();
      highlightValidMoves();
    }
  }

  function endGame(reason){
    gameActive=false;
    document.getElementById('final-player').textContent=playerScore;
    document.getElementById('final-computer').textContent=computerScore;
    let title, emoji;
    if(playerScore>computerScore){ title=t('youWin'); emoji='🏆 '; stats.wins++; }
    else if(computerScore>playerScore){ title=t('computerWins'); emoji='🤖 '; stats.losses++; }
    else { title=t('tie'); emoji='🤝 '; stats.ties++; }
    saveStats();
    renderStats();
    document.getElementById('end-title').textContent=emoji+title;
    document.getElementById('end-reason').textContent=reason;
    showModal('end-modal');
    refreshBoardClasses();
    if(lastMoveEl) lastMoveEl.classList.add('last-move');
    updateScores();
    playSound(playerScore>computerScore?'win':(computerScore>playerScore?'lose':'tie'));
    if(playerScore>computerScore) launchConfetti();
  }

  // ---------- confetti ----------
  function launchConfetti(){
    if(typeof requestAnimationFrame!=='function') return;
    const cv=document.createElement('canvas');
    if(!cv.getContext) return;
    const ctx=cv.getContext('2d');
    if(!ctx) return;
    cv.id='confetti-canvas';
    cv.width=window.innerWidth; cv.height=window.innerHeight;
    document.body.appendChild(cv);
    const colors=['#38bdf8','#8b5cf6','#f472b6','#facc15','#34d399','#fb7185'];
    const parts=[];
    for(let i=0;i<140;i++){
      parts.push({
        x:Math.random()*cv.width,
        y:-20-Math.random()*cv.height*0.3,
        vx:(Math.random()-0.5)*2.4,
        vy:2+Math.random()*3.5,
        size:5+Math.random()*5,
        color:colors[Math.floor(Math.random()*colors.length)],
        rot:Math.random()*Math.PI*2,
        vr:(Math.random()-0.5)*0.25
      });
    }
    const start=performance.now();
    function frame(now){
      const elapsed=now-start;
      ctx.clearRect(0,0,cv.width,cv.height);
      const fade=elapsed>2000 ? Math.max(0,1-(elapsed-2000)/600) : 1;
      ctx.globalAlpha=fade;
      parts.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.02;
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle=p.color;
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
        ctx.restore();
      });
      if(elapsed<2600){ requestAnimationFrame(frame); }
      else if(cv.parentNode){ cv.parentNode.removeChild(cv); }
    }
    requestAnimationFrame(frame);
  }

  // ---------- AI ----------
  function computerMove(){
    if(!gameActive) return;
    const moves=getValidMoves();
    if(moves.length===0){ checkGameState(); return; }
    let choice;
    if(difficulty==='easy'){
      choice = moves[Math.floor(Math.random()*moves.length)];
    } else if(difficulty==='medium'){
      choice = moves.reduce((best,m)=> board[m.row][m.col]>board[best.row][best.col] ? m : best, moves[0]);
    } else {
      choice = getBestMoveMinimax(moves);
    }
    makeMove(choice.row,choice.col,'computer');
  }

  function cloneClaimedBool(){
    const c=[];
    for(let r=0;r<boardSize;r++){
      c.push([]);
      for(let col=0;col<boardSize;col++) c[r].push(!!claimed[r][col]);
    }
    return c;
  }

  function getValidMovesForState(claimedBool,lm,nc){
    if(!lm){
      const moves=[];
      for(let r=0;r<boardSize;r++) for(let c=0;c<boardSize;c++) if(!claimedBool[r][c]) moves.push({row:r,col:c});
      return moves;
    }
    const moves=[];
    if(nc==='column'){
      for(let r=0;r<boardSize;r++) if(!claimedBool[r][lm.col]) moves.push({row:r,col:lm.col});
    } else {
      for(let c=0;c<boardSize;c++) if(!claimedBool[lm.row][c]) moves.push({row:lm.row,col:c});
    }
    return moves;
  }

  function minimax(claimedBool,lm,nc,cScore,pScore,depth,isMax,alpha,beta){
    const moves=getValidMovesForState(claimedBool,lm,nc);
    if(moves.length===0 || depth===0){
      return cScore - pScore;
    }
    const ordered=[...moves].sort((a,b)=>board[b.row][b.col]-board[a.row][a.col]);
    if(isMax){
      let value=-Infinity;
      for(const m of ordered){
        claimedBool[m.row][m.col]=true;
        const newNc=(nc==='column')?'row':'column';
        const val=minimax(claimedBool,{row:m.row,col:m.col},newNc,cScore+board[m.row][m.col],pScore,depth-1,false,alpha,beta);
        claimedBool[m.row][m.col]=false;
        value=Math.max(value,val);
        alpha=Math.max(alpha,value);
        if(alpha>=beta) break;
      }
      return value;
    } else {
      let value=Infinity;
      for(const m of ordered){
        claimedBool[m.row][m.col]=true;
        const newNc=(nc==='column')?'row':'column';
        const val=minimax(claimedBool,{row:m.row,col:m.col},newNc,cScore,pScore+board[m.row][m.col],depth-1,true,alpha,beta);
        claimedBool[m.row][m.col]=false;
        value=Math.min(value,val);
        beta=Math.min(beta,value);
        if(alpha>=beta) break;
      }
      return value;
    }
  }

  function getBestMoveMinimax(moves){
    const claimedBool=cloneClaimedBool();
    let bestScore=-Infinity;
    let bestMove=moves[0];
    let alpha=-Infinity, beta=Infinity;
    const ordered=[...moves].sort((a,b)=>board[b.row][b.col]-board[a.row][a.col]);
    for(const m of ordered){
      claimedBool[m.row][m.col]=true;
      const newNc=(nextConstraint==='column')?'row':'column';
      const val=minimax(claimedBool,{row:m.row,col:m.col},newNc,
        computerScore+board[m.row][m.col], playerScore, getDepthLimit()-1, false, alpha, beta);
      claimedBool[m.row][m.col]=false;
      if(val>bestScore){ bestScore=val; bestMove=m; }
      alpha=Math.max(alpha,val);
    }
    return bestMove;
  }

  // Same search as the Hard AI, but evaluated from the player's side: picks
  // the move that minimizes (computerScore - playerScore), i.e. best for the player.
  function getHintMove(moves){
    const claimedBool=cloneClaimedBool();
    let bestScore=Infinity;
    let bestMove=moves[0];
    let alpha=-Infinity, beta=Infinity;
    const ordered=[...moves].sort((a,b)=>board[b.row][b.col]-board[a.row][a.col]);
    for(const m of ordered){
      claimedBool[m.row][m.col]=true;
      const newNc=(nextConstraint==='column')?'row':'column';
      const val=minimax(claimedBool,{row:m.row,col:m.col},newNc,
        computerScore, playerScore+board[m.row][m.col], getDepthLimit()-1, true, alpha, beta);
      claimedBool[m.row][m.col]=false;
      if(val<bestScore){ bestScore=val; bestMove=m; }
      beta=Math.min(beta,val);
    }
    return bestMove;
  }

  function triggerHint(){
    if(!gameActive || currentTurn!=='player') return;
    const moves=getValidMoves();
    if(moves.length===0) return;
    const hint=getHintMove(moves);
    document.querySelectorAll('.cell.hint').forEach(el=>el.classList.remove('hint'));
    cellEls[hint.row][hint.col].classList.add('hint');
    playSound('hint');
  }

  // ---------- sound ----------
  function ensureAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }

  function playTone(freq,duration,type,vol){
    if(!soundOn) return;
    ensureAudio();
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type=type||'sine';
    osc.frequency.value=freq;
    gain.gain.value=vol||0.15;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+(duration||0.12));
    osc.stop(audioCtx.currentTime+(duration||0.12)+0.02);
  }

  function playSound(kind){
    if(!soundOn) return;
    switch(kind){
      case 'claimPlayer':
        playTone(523,0.09,'triangle',0.14);
        setTimeout(()=>playTone(659,0.1,'triangle',0.12),70);
        break;
      case 'claimComputer':
        playTone(392,0.09,'triangle',0.12);
        setTimeout(()=>playTone(330,0.1,'triangle',0.1),70);
        break;
      case 'invalid': playTone(130,0.14,'sawtooth',0.1); break;
      case 'hint':
        playTone(880,0.08,'sine',0.1);
        setTimeout(()=>playTone(1175,0.1,'sine',0.09),80);
        break;
      case 'win': [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>playTone(f,0.18,'triangle',0.15),i*110)); break;
      case 'lose': [440,330,262,196].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sawtooth',0.1),i*150)); break;
      case 'tie': [440,440].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'sine',0.13),i*180)); break;
    }
  }

  // ---------- screens ----------
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('overlay').classList.remove('active');
  }

  function startGame(){
    gameId++;
    initBoardData();
    renderBoard();
    playerScore=0; computerScore=0;
    lastMove=null; nextConstraint=null; lastMoveEl=null; kbFocus=null;
    if(starterMode==='random') currentTurn = Math.random()<0.5 ? 'player' : 'computer';
    else currentTurn = starterMode;
    gameActive=true;
    document.getElementById('diff-label').textContent = t(difficulty);
    document.getElementById('size-badge').textContent = t('boardBadge',{size:boardSize});
    document.getElementById('move-log').innerHTML = '';
    document.getElementById('player-score').textContent='0';
    document.getElementById('computer-score').textContent='0';
    applyMoveLogVisibility();
    showScreen('game-screen');
    updateScores();
    checkGameState();
  }

  // ---------- wire up UI ----------
  document.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      difficulty=btn.dataset.diff;
    });
  });

  document.querySelectorAll('.size-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      boardSize=parseInt(btn.dataset.size,10);
    });
  });

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);
  document.getElementById('rematch-btn').addEventListener('click', startGame);

  document.getElementById('menu-btn').addEventListener('click', ()=>{ gameActive=false; showScreen('menu-screen'); });
  document.getElementById('end-menu-btn').addEventListener('click', ()=>{ gameActive=false; showScreen('menu-screen'); });

  function showModal(id){
    ['end-modal','rules-modal','settings-modal'].forEach(mid=>{
      document.getElementById(mid).style.display = (mid===id) ? 'block' : 'none';
    });
    document.getElementById('overlay').classList.add('active');
  }
  function hideOverlay(){
    document.getElementById('overlay').classList.remove('active');
  }
  function openRules(){ renderRulesBody(); showModal('rules-modal'); }
  function openSettings(){ showModal('settings-modal'); }

  document.getElementById('rules-btn-menu').addEventListener('click', openRules);
  document.getElementById('rules-btn-game').addEventListener('click', openRules);
  document.getElementById('close-rules-btn').addEventListener('click', hideOverlay);

  document.getElementById('settings-btn-menu').addEventListener('click', openSettings);
  document.getElementById('settings-btn-game').addEventListener('click', openSettings);
  document.getElementById('close-settings-btn').addEventListener('click', hideOverlay);

  document.getElementById('hint-btn').addEventListener('click', triggerHint);

  document.getElementById('sound-toggle').addEventListener('change', (e)=>{
    soundOn=e.target.checked;
    saveSettings();
  });

  document.getElementById('movelog-toggle').addEventListener('change', (e)=>{
    showMoveLog=e.target.checked;
    saveSettings();
    applyMoveLogVisibility();
  });

  document.getElementById('starter-select').addEventListener('change', (e)=>{
    starterMode=e.target.value;
    saveSettings();
  });

  document.getElementById('language-select').addEventListener('change', (e)=>{
    currentLang=e.target.value;
    saveSettings();
    applyTranslations();
  });

  // ---------- init ----------
  loadSettings();
  loadStats();
  document.getElementById('language-select').value = currentLang;
  document.getElementById('starter-select').value = starterMode;
  document.getElementById('sound-toggle').checked = soundOn;
  document.getElementById('movelog-toggle').checked = showMoveLog;
  applyTranslations();
  applyMoveLogVisibility();
  renderStats();

})();
</script>
